<!DOCTYPE html>
<html>
<head>
  <title>3 Tier App</title>
</head>
<body>
  <h1>3 Tier Python App 🚀</h1>

  <button onclick="addData()">Add Data</button>
  <button onclick="getData()">Get Data</button>

  <pre id="output"></pre>

  <script>
    const API = "http://localhost:5000";

    function addData() {
      fetch(API + "/add")
        .then(res => res.text())
        .then(data => document.getElementById("output").innerText = data);
    }

    function getData() {
      fetch(API + "/data")
        .then(res => res.json())
        .then(data => document.getElementById("output").innerText = JSON.stringify(data, null, 2));
    }
  </script>
</body>
</html>
